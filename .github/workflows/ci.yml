name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      # Pre-built-bundle browser smoke: guards that live edit (save re-render,
      # create, rename, move) survives `vite build` in the `dist-studio` bundle
      # the published CLI serves. `test:smoke` builds the bundle, then runs the
      # smoke with LERRET_SMOKE=1 (a missing bundle or browser is a hard FAIL).
      # The ubuntu-latest runner image ships Google Chrome, which
      # `launchHeadlessBrowser` picks up via `playwright-core` channel:chrome.
      - name: Smoke (pre-built dist-studio live edit)
        run: pnpm --filter @lerret/cli test:smoke
