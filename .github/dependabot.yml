# Dependabot configuration for Lerret.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Ecosystem entries will activate once a corresponding manifest exists.
# Add `npm`/`pnpm`/etc. blocks once the app's package.json lands.

version: 2
updates:
  # GitHub Actions (covers any workflows we add later)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 5

